    <h1>鯨豚類 (Cetaceans)</h1>
    <p>鯨豚類（學名：Cetacea）是一類完全水生的哺乳動物，包括鯨魚、海豚及鼠海豚。牠們是由陸地上的偶蹄目動物演化而來，現已完全適應海洋中的生活環境。</p>
    <p>鯨豚類擁有流線型的體型、特化為鰭狀的前肢以及水平的尾鰭。由於是哺乳動物，牠們必須利用肺呼吸，並定期浮出水面進行換氣。鯨豚類以其高度的智慧、複雜的社交行為以及卓越的音波導航（回聲定位）能力而聞名。</p>
